<!DOCTYPE html>
<html>
<head>
<title>Luo Browser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#202124;--bg2:#292a2d;--bg3:#323639;--border:#3c4043;--text:#e8eaed;--text2:#9aa0a6;--accent:#8ab4f8;--accent2:#f28b82;--danger:#f44336;--success:#81c995}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#header{background:var(--bg);padding:8px 8px 0;display:flex;flex-direction:column;gap:0}
#tabs{display:flex;align-items:flex-end;gap:2px;overflow-x:auto;padding:0 4px;min-height:40px}
.tab{height:36px;min-width:100px;max-width:180px;padding:0 4px 0 10px;background:var(--bg2);border:none;border-radius:8px 8px 0 0;color:var(--text2);font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;position:relative;flex-shrink:0;transition:background 0.2s}
.tab.active{background:var(--bg3);color:var(--text);flex:1}
.tab-icon{font-size:14px;flex-shrink:0}
.tab-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left;min-width:0;font-size:12px}
.tab-close{font-size:14px;opacity:0;padding:2px 6px;border-radius:4px;flex-shrink:0}
.tab:hover .tab-close{opacity:0.7;background:rgba(255,255,255,0.1)}
.tab-close:hover{opacity:1;background:var(--danger)!important;color:#fff}
.tab.audio .tab-icon:after{content:'🔊';position:absolute;top:-4px;right:-4px;font-size:8px;background:var(--bg);border-radius:50%;padding:2px}
.new-tab{width:36px;height:36px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;border-radius:8px 8px 0 0;flex-shrink:0}
.new-tab:hover{background:var(--border)}
#toolbar{display:flex;align-items:center;gap:4px;padding:8px}
.nav-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;border-radius:50%;flex-shrink:0;transition:all 0.2s}
.nav-btn:hover{background:var(--border);color:var(--text)}
.nav-btn:active{transform:scale(0.95)}
#urlbar{flex:1;height:32px;padding:0 12px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:all 0.2s}
#urlbar:focus{border-color:var(--accent);background:var(--bg3)}
#urlbar.secure{border-left:3px solid var(--success)}
#urlbar.secure+.url-icon{color:var(--success)}
#urlbar.danger{border-color:var(--danger)}
#urlicons{display:flex;gap:2px;margin-left:8px}
.url-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);cursor:pointer;border-radius:4px}
.url-icon:hover{background:var(--border);color:var(--text)}
.url-icon.active{color:var(--accent)}
#bookmarks{background:var(--bg2);padding:4px 8px;display:flex;gap:4px;overflow-x:auto;flex-shrink:0;max-height:60px}
.bookmark{height:24px;padding:0 10px;background:var(--bg3);border:none;border-radius:4px;color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all 0.2s}
.bookmark:hover{background:var(--border)}
#content{flex:1;position:relative;background:#fff}
iframe{width:100%;height:100%;border:none;background:#fff}
#status{background:var(--bg3);padding:4px 12px;font-size:11px;color:var(--text2);display:flex;justify-content:space-between;flex-shrink:0;align-items:center}
.status-left,.status-right{display:flex;gap:12px;align-items:center}
.status-item{cursor:pointer;padding:2px 4px;border-radius:4px}
.status-item:hover{background:var(--border);color:var(--text)}
#extensions{position:fixed;bottom:50px;right:20px;display:flex;gap:8px;z-index:100}
.ext-badge{width:32px;height:32px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform 0.2s}
.ext-badge:hover{transform:scale(1.1)}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:9999}
#overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:16px;padding:24px;min-width:500px;max-width:700px;max-height:80vh;overflow:auto;box-shadow:0 16px 64px rgba(0,0,0,0.5);animation:modalIn 0.2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:20px;font-weight:500}
.modal-close{width:32px;height:32px;background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;border-radius:50%}
.modal-close:hover{background:var(--border)}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px 12px 44px;background:var(--bg);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:14px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text2)}
.section{margin-bottom:24px}
.section-title{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{background:var(--bg);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s}
.card:hover{background:var(--border);transform:translateY(-2px)}
.card-icon{font-size:32px;margin-bottom:8px}
.card-title{font-size:14px;font-weight:500;margin-bottom:4px}
.card-desc{font-size:12px;color:var(--text2)}
.toggle{width:48px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background 0.2s}
.toggle.active{background:var(--accent)}
.toggle:after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform 0.2s}
.toggle.active:after{transform:translateX(24px)}
#context-menu{position:fixed;background:var(--bg2);border-radius:8px;padding:6px 0;min-width:180px;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:10000;display:none}
.context-item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:13px}
.context-item:hover{background:var(--border)}
.context-shortcut{color:var(--text2);margin-left:auto;font-size:12px}
.context-divider{height:1px;background:var(--border);margin:6px 0}
#video-player{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;z-index:9999;display:none;box-shadow:0 0 50px rgba(0,0,0,0.8)}
#video-player.show{display:block}
#video-player iframe{width:80vw;height:45vw}
.video-close{position:absolute;top:-40px;right:0;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;padding:8px 16px;cursor:pointer;border-radius:4px}
</style>
</head>
<body>
<div id="header">
<div id="tabs"><button class="tab active" data-id="1"><span class="tab-icon">🌐</span><span class="tab-title">New Tab</span><span class="tab-close">×</span></button><button class="new-tab">+</button></div>
<div id="toolbar">
<button class="nav-btn" id="back" title="Back (Alt+Left)">←</button>
<button class="nav-btn" id="forward" title="Forward (Alt+Right)">→</button>
<button class="nav-btn" id="refresh" title="Refresh (Ctrl+R)">↻</button>
<button class="nav-btn" id="home" title="Home">🏠</button>
<input type="text" id="urlbar" placeholder="Search or enter URL">
<div id="urlicons"><span class="url-icon" id="lock" title="Connection">🔒</span><span class="url-icon" id="star" title="Bookmark (Ctrl+D)">★</span><span class="url-icon" id="share" title="Share">↗</span><span class="url-icon" id="menu" title="More">⋮</span></div>
</div>
<div id="bookmarks"></div>
</div>
<div id="content"><iframe id="frame" src="https://google.com"></iframe></div>
<div id="status"><div class="status-left"><span id="status-text">Done</span><span id="load-time"></span></div><div class="status-right"><span class="status-item" onclick="showModal('history')">History</span><span class="status-item" onclick="showModal('downloads')">Downloads</span><span class="status-item" onclick="showModal('bookmarks')">Bookmarks</span><span class="status-item" onclick="showModal('extensions')">Extensions</span></div></div>
<div id="extensions"><div class="ext-badge" title="Ad Blocker" onclick="toggleExtension('adblock')">🛡️</div><div class="ext-badge" title="Dark Mode" onclick="toggleExtension('darkmode')">🌙</div><div class="ext-badge" title="Video PIP" onclick="toggleExtension('pip')">📺</div></div>
<div id="overlay"><div class="modal"><div class="modal-header"><h2 id="modal-title">Title</h2><button class="modal-close" onclick="hideModal()">×</button></div><div id="modal-content"></div></div></div>
<div id="context-menu"><div class="context-item" onclick="contextAction('back')">Back←/div><div class="context-item" onclick="contextAction('forward')">Forward→</div><div class="context-divider"></div><div class="context-item" onclick="contextAction('reload')">Reload</div><div class="context-item" onclick="contextAction('save')">Save Page As...</div><div class="context-divider"></div><div class="context-item" onclick="contextAction('view-source')">View Page Source</div><div class="context-item" onclick="contextAction('inspect')">Inspect Element</div></div>
<div id="video-player"><button class="video-close" onclick="closeVideo()">× Close</button><iframe id="video-frame" allowfullscreen></iframe></div>
<script>
var tabs=[{id:1,url:'https://google.com',title:'Google',icon:'🌐',loading:false,audio:false}];
var activeTab=1;
var tabId=2;
var bookmarks=JSON.parse(localStorage.getItem('luo-bookmarks')||'[]');
var history=JSON.parse(localStorage.getItem('luo-history')||'[]');
var downloads=JSON.parse(localStorage.getItem('luo-downloads')||'[]');
var extensions={adblock:false,darkmode:false,pip:false};
var startTime=Date.now();

function renderTabs(){
  document.getElementById('tabs').innerHTML=tabs.map(t=>'<button class="tab '+(t.id===activeTab?'active':'')+(t.audio?' audio':'')+(t.loading?' loading':'')+'" data-id="'+t.id+'"><span class="tab-icon">'+(t.icon||'🌐')+'</span><span class="tab-title">'+(t.title||'New Tab')+'</span><span class="tab-close" onclick="event.stopPropagation();closeTab('+t.id+')">×</span></button>').join('')+'<button class="new-tab" onclick="newTab()">+</button>';
  document.querySelectorAll('.tab').forEach(el=>el.onclick=function(){switchTab(parseInt(this.dataset.id))});
}

function newTab(){
  var id=tabId++;
  tabs.push({id,url:'https://google.com',title:'New Tab',icon:'🌐',loading:false,audio:false});
  switchTab(id);
}

function closeTab(id){
  if(tabs.length<=1)return;
  var idx=tabs.findIndex(t=>t.id===(id||activeTab));
  tabs.splice(idx,1);
  if(activeTab===id||!tabs.find(t=>t.id===activeTab)){
    activeTab=tabs[Math.max(0,idx-1)].id;
  }
  renderTabs();
  loadTab(activeTab);
}

function switchTab(id){
  activeTab=id;
  renderTabs();
  loadTab(id);
}

function loadTab(id){
  var t=tabs.find(tab=>tab.id===id);
  document.getElementById('frame').src=t.url;
  document.getElementById('urlbar').value=t.url;
  updateSecurityIndicator();
}

function updateSecurityIndicator(){
  var t=tabs.find(tab=>tab.id===activeTab);
  var secure=t.url.startsWith('https');
  document.getElementById('lock').textContent=secure?'🔒':'🔓';
  document.getElementById('lock').style.color=secure?'#81c995':'#f28b82';
  document.getElementById('urlbar').className=secure?'secure':'';
}

var loadTimer;
document.getElementById('frame').onload=function(){
  clearTimeout(loadTimer);
  var t=tabs.find(tab=>tab.id===activeTab);
  if(t){
    try{
      t.title=document.getElementById('frame').contentDocument.title;
      t.loading=false;
    }catch(e){}
    history.unshift({url:t.url,title:t.title,time:Date.now()});
    localStorage.setItem('luo-history',JSON.stringify(history.slice(0,500)));
  }
  renderTabs();
  updateSecurityIndicator();
  document.getElementById('status-text').textContent='Done';
  document.getElementById('load-time').textContent=((Date.now()-startTime)/1000).toFixed(2)+'s';
};

document.getElementById('frame').onloadstart=function(){
  var t=tabs.find(tab=>tab.id===activeTab);
  if(t)t.loading=true;
  renderTabs();
  loadTimer=setTimeout(function(){document.getElementById('status-text').textContent='Loading...';},300);
};

document.getElementById('urlbar').onkeydown=function(e){
  if(e.key==='Enter'){
    var input=this.value.trim();
    var url=input;
    if(!input)return;
    if(!input.startsWith('http')&&!input.includes('.')&&!input.startsWith('localhost')){
      url='https://www.google.com/search?q='+encodeURIComponent(input);
    }else if(!input.startsWith('http')&&!input.includes('://')){
      url='https://'+input;
    }
    var t=tabs.find(tab=>tab.id===activeTab);
    if(t){t.url=url;document.getElementById('frame').src=url;}
  }
};

document.getElementById('back').onclick=function(){try{frames[0].history.back()}catch(e){}};
document.getElementById('forward').onclick=function(){try{frames[0].history.forward()}catch(e){}};
document.getElementById('refresh').onclick=function(){document.getElementById('frame').src=document.getElementById('frame').src};
document.getElementById('home').onclick=function(){document.getElementById('frame').src='https://google.com'};
document.getElementById('star').onclick=toggleBookmark;
document.getElementById('menu').onclick=function(e){e.stopPropagation();showContextMenu(e);};

function toggleBookmark(){
  var t=tabs.find(tab=>tab.id===activeTab);
  if(t){
    var exists=bookmarks.find(b=>b.url===t.url);
    if(exists){
      bookmarks=bookmarks.filter(b=>b.url!==t.url);
      document.getElementById('star').classList.remove('active');
    }else{
      bookmarks.push({url:t.url,title:t.title});
      document.getElementById('star').classList.add('active');
    }
    localStorage.setItem('luo-bookmarks',JSON.stringify(bookmarks));
    renderBookmarks();
  }
}

function renderBookmarks(){
  document.getElementById('bookmarks').innerHTML=bookmarks.map(b=>'<button class="bookmark" data-url="'+b.url+'">'+b.title+'</button>').join('');
  document.querySelectorAll('#bookmarks .bookmark').forEach(b=>b.onclick=function(){document.getElementById('frame').src=this.dataset.url});
}
renderBookmarks();

function showModal(type){
  var title,content='';
  if(type==='history'){
    title='History';
    content='<div class="search-box"><input type="text" placeholder="Search history..." onkeyup="searchHistory(this.value)"></div><div id="history-list">'+history.slice(0,50).map(h=>'<div class="card" onclick="goTo(\''+h.url+'\')"><div class="card-icon">🌐</div><div class="card-title">'+(h.title||'Untitled')+'</div><div class="card-desc" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">'+h.url+'</div></div>').join('')+'</div>';
  }else if(type==='bookmarks'){
    title='Bookmarks Manager';
    content='<div class="grid">'+bookmarks.map(b=>'<div class="card" onclick="goTo(\''+b.url+'\')"><div class="card-icon">⭐</div><div class="card-title">'+b.title+'</div><div class="card-desc">'+b.url+'</div><button onclick="event.stopPropagation();removeBookmark(\''+b.url+'\')" style="margin-top:8px;padding:4px 8px;background:var(--danger);border:none;border-radius:4px;color:#fff;cursor:pointer">Remove</button></div>').join('')+'</div>';
  }else if(type==='extensions'){
    title='Extensions';
    content='<div class="grid"><div class="card" onclick="toggleExtension(\'adblock\')"><div class="card-icon">🛡️</div><div class="card-title">Ad Blocker</div><div class="card-desc">Block ads across all sites</div><div class="toggle '+(extensions.adblock?'active':'')+'" style="margin-top:8px"></div></div><div class="card" onclick="toggleExtension(\'darkmode\')"><div class="card-icon">🌙</div><div class="card-title">Dark Mode</div><div class="card-desc">Enable dark theme</div><div class="toggle '+(extensions.darkmode?'active':'')+'" style="margin-top:8px"></div></div><div class="card" onclick="toggleExtension(\'pip\')"><div class="card-icon">📺</div><div class="card-title">Picture-in-Picture</div><div class="card-desc">Watch videos while browsing</div><div class="toggle '+(extensions.pip?'active':'')+'" style="margin-top:8px"></div></div></div>';
  }else if(type==='downloads'){
    title='Downloads';
    content=downloads.length?downloads.map(d=>'<div class="card"><div class="card-icon">📄</div><div class="card-title">'+d.name+'</div><div class="card-desc">'+d.status+'</div></div>').join(''):'<p style="color:var(--text2);text-align:center;padding:40px">No downloads yet</p>';
  }
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-content').innerHTML=content;
  document.getElementById('overlay').classList.add('show');
}

function hideModal(){
  document.getElementById('overlay').classList.remove('show');
}

function goTo(url){
  document.getElementById('frame').src=url;
  hideModal();
}

function removeBookmark(url){
  bookmarks=bookmarks.filter(b=>b.url!==url);
  localStorage.setItem('luo-bookmarks',JSON.stringify(bookmarks));
  showModal('bookmarks');
}

function searchHistory(query){
  if(!query)query='';
  var filtered=history.filter(h=>h.title.toLowerCase().includes(query.toLowerCase())||h.url.toLowerCase().includes(query.toLowerCase()));
  document.getElementById('history-list').innerHTML=filtered.slice(0,20).map(h=>'<div class="card" onclick="goTo(\''+h.url+'\')"><div class="card-icon">🌐</div><div class="card-title">'+(h.title||'Untitled')+'</div><div class="card-desc">'+h.url+'</div></div>').join('');
}

function toggleExtension(ext){
  extensions[ext]=!extensions[ext];
  showModal('extensions');
  if(ext==='darkmode'&&extensions.darkmode){
    document.getElementById('frame').contentDocument.body.style.filter='invert(1) hue-rotate(180deg)';
  }
}

function showContextMenu(e){
  e.preventDefault();
  var menu=document.getElementById('context-menu');
  menu.style.left=e.clientX+'px';
  menu.style.top=e.clientY+'px';
  menu.style.display='block';
}

function contextAction(action){
  document.getElementById('context-menu').style.display='none';
  if(action==='back')document.getElementById('back').click();
  else if(action==='forward')document.getElementById('forward').click();
  else if(action==='reload')document.getElementById('refresh').click();
}

document.addEventListener('click',function(){
  document.getElementById('context-menu').style.display='none';
});

renderTabs();
</script>
</body>
</html>
